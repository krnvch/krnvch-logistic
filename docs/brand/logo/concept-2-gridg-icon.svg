<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 64" width="56" height="64" role="img" aria-labelledby="title desc">
  <title id="title">Grida Logo</title>
  <desc id="desc">Letter G constructed from bold geometric bars — grid architecture</desc>
  <!-- Top bar -->
  <rect x="0" y="0" width="56" height="11" fill="#00875A"/>
  <!-- Left bar (full height) -->
  <rect x="0" y="0" width="11" height="64" fill="#00875A"/>
  <!-- Bottom bar -->
  <rect x="0" y="53" width="56" height="11" fill="#00875A"/>
  <!-- Right bar (bottom half, from shelf to bottom) -->
  <rect x="45" y="30" width="11" height="34" fill="#00875A"/>
  <!-- Crossbar / shelf -->
  <rect x="24" y="30" width="32" height="11" fill="#00875A"/>
</svg>
